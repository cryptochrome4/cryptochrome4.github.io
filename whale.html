<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間の遅れ（Time Dilation）の原理 - 全17ページ</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --sys-green: #10b981;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95vw;
            max-width: 850px;
            height: 90vh;
            max-height: 650px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* トップバー（コピーボタンなどは一切配置していません） */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: rgba(0, 0, 0, 0.25);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        .counter {
            font-size: 0.95rem;
            color: var(--text-sub);
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* 紙芝居メイン領域（視覚要素95%） */
        .stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 10px 30px;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 420px;
        }

        /* 下部の字幕エリア */
        .caption-area {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.35);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .caption {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-main);
            margin: 0;
            font-weight: 500;
        }

        /* スライド操作ボタン */
        .controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            pointer-events: none;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(21, 31, 50, 0.9);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.08);
        }

        .btn:disabled {
            border-color: #334155;
            color: #334155;
            background: rgba(21, 31, 50, 0.5);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="title">固有時と時間の遅れの幾何学</div>
        <div class="counter" id="pageCounter">1 / 17</div>
    </div>
    
    <div class="stage" id="stageCanvas">
        <!-- SVGグラフィックがここに自動描画されます -->
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="prevPage()" disabled>&lt;</button>
        <button class="btn" id="nextBtn" onclick="nextPage()">&gt;</button>
    </div>

    <div class="caption-area">
        <p class="caption" id="captionText">読み込み中...</p>
    </div>
</div>

<script>
const totalPages = 17;
let currentPage = 1;

// 共通の宇宙空間背景SVGテンプレート
const svgStart = `<svg viewBox="0 0 800 420" xmlns="http://w3.org">
    <rect width="800" height="420" fill="#090d16"/>
    <g opacity="0.3">
        <circle cx="80" cy="60" r="1" fill="#fff"/>
        <circle cx="720" cy="90" r="1.5" fill="#fff"/>
        <circle cx="500" cy="40" r="1" fill="#fff"/>
        <circle cx="150" cy="350" r="1.2" fill="#fff"/>
        <circle cx="620" cy="320" r="1" fill="#fff"/>
    </g>`;
const svgEnd = `</svg>`;

// 全17ページの絵コンテデータ（視覚情報95%の図形オブジェクトとセリフ）
const storyData = [

            <rect x="60" y="260" width="680" height="110" rx="12" fill="#111827" stroke="#334155" stroke-width="2"/>

        `
    },
    {
        caption: "【3/17】この静止系Sにおける、時計W1と時計W2の間の物理的な『空間の距離』を「d」と定義します。",
        draw: () => `
            <rect x="60" y="260" width="680" height="110" rx="12" fill="#111827" stroke="#334155" stroke-width="2"/>

        draw: () => `
            <!-- ロケット系 S' -->
            <g transform="translate(100, 60)">
                <rect x="0" y="0" width="220" height="100" rx="15" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
                <polygon points="220,0 260,50 220,100" fill="#fbbf24"/>

                <text x="20" y="40" fill="#fbbf24" font-size="20" font-weight="bold">系 S'</text>
            </g>
        `
    },
    {
        caption: "【5/17】このロケット（系S'）は、静止系Sに対して右方向へ一定の速度「v」で滑らかに移動しています。",
        draw: () => `
            <g transform="translate(250, 50)">
                <rect x="0" y="0" width="220" height="100" rx="15" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>

                <line x1="280" y1="50" x2="340" y2="50" stroke="#fbbf24" stroke-width="4"/>
                <polygon points="340,45 355,50 340,55" fill="#fbbf24"/>
                <text x="300" y="35" fill="#fbbf24" font-size="18" font-weight="bold">速度 v ➔</text>
            </g>
        `
    },
    {
        caption: "【6/17】《イベント1》ロケットの時計W'が、最初の時計W1の真上を完全に通過する瞬間が訪れます。",
        draw: () => `
            <rect x="60" y="260" width="680" height="110" rx="12" fill="#111827" stroke="#334155" stroke-width="2"/>
            <circle cx="220" cy="315" r="32" fill="#090d16" stroke="#38bdf8" stroke-width="3"/>
            <!-- 重なるロケット -->
            <g transform="translate(120, 110)">
                <rect x="0" y="0" width="200" height="90" rx="15" fill="#1e293b" stroke="#fbbf24" stroke-width="2" opacity="0.95"/>
                <polygon points="200,0 235,45 200,90" fill="#fbbf24"/>
