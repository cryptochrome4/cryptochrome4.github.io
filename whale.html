<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相対性理論 紙芝居：時間の遅れと固有時</title>
    <style>
        :root {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-success: #10b981;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        /* パスワード＆コピーセクション */
        .tools-container {
            background-color: var(--card-bg);
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            border: 1px solid #374151;
        }

        .pass-input {
            background: #111827;
            border: 1px solid #4b5563;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }

        .pass-input:focus {
            border-color: var(--accent);
        }

        .copy-btn {
            background: #4b5563;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            opacity: 0.5;
            transition: all 0.2s ease;
        }

        .copy-btn.active {
            background: var(--accent);
            cursor: pointer;
            opacity: 1;
        }

        .copy-btn.active:hover {
            background: #2563eb;
        }

        .copy-btn.success {
            background: var(--accent-success) !important;
        }

        /* 紙芝居メインステージ */
        .storyboard-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #374151;
        }

        /* 95%を占めるビジュアルエリア */
        .visual-area {
            position: relative;
            width: 100%;
            height: 450px;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SVGアニメーション・描画用のベーススタイル */
        .stage-svg {
            width: 100%;
            height: 100%;
        }

        /* 5%のテキスト解説エリア */
        .text-area {
            height: 60px;
            padding: 15px 20px;
            background: #111827;
            border-top: 1px solid #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.4;
        }

        /* ナビゲーションコントロール */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
        }

        .nav-btn {
            background: #374151;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #4b5563;
        }

        .nav-btn:disabled {
            background: #1f2937;
            color: #4b5563;
            cursor: not-allowed;
        }

        .page-indicator {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        /* 数式スタイル */
        .latex-text {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>相対性理論の視覚化：2つの「時計の出会い」が示す時間の遅れ</h1>
    </header>

    <!-- 工具箱（パスワード認証＆ソースコードコピー） -->
    <div class="tools-container">
        <label for="passwordField" style="font-size: 0.9rem; color: var(--text-muted);">複製用パスワード:</label>
        <input type="password" id="passwordField" class="pass-input" placeholder="光速の数値を入力...">
        <button id="copyCodeBtn" class="copy-btn" disabled>
            <!-- コピーアイコン (SVG) -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <span id="btnText">コードをコピー</span>
        </button>
    </div>

    <!-- 紙芝居本体 -->
    <div class="storyboard-container">
        <!-- 95%の絵の領域 -->
        <div class="visual-area">
            <svg id="canvas" class="stage-svg" viewBox="0 0 800 450"></svg>
        </div>
        
        <!-- 5%の文字の領域 -->
        <div id="narration" class="text-area">
            読み込み中...
        </div>

        <!-- 操作パネル -->
        <div class="controls">
            <button id="prevBtn" class="nav-btn" onclick="changePage(-1)">◀ 前へ</button>
            <div id="pageIndicator" class="page-indicator">1 / 10</div>
            <button id="nextBtn" class="nav-btn" onclick="changePage(1)">次へ ▶</button>
        </div>
    </div>

    <script>
        // 全10ページのデータ定義 (絵の描画命令と5%のナレーションテキスト)
        const pages = [
            {
                text: "1. 系 S には、距離 d だけ離れて静止する2つの時計 W₁ と W₂ が用意されています。",
                draw: (ctx) => {
                    ctx.appendChild(drawSystemLine(150, "静止系 S"));
                    ctx.appendChild(drawClock(250, 150, "W₁", "00:00", "#3b82f6"));
                    ctx.appendChild(drawClock(550, 150, "W₂", "00:00", "#3b82f6"));
                    ctx.appendChild(drawDistanceArrow(250, 550, 210, "空間的距離 d"));
                }
            },
            {
                text: "2. 一方、動く系 S′ には時計 W′ があり、系 S に対して右方向へ速度 v で移動しています。",
                draw: (ctx) => {
                    ctx.appendChild(drawSystemLine(150, "静止系 S"));
                    ctx.appendChild(drawClock(250, 150, "W₁", "00:00", "#3b82f6"));
                    ctx.appendChild(drawClock(550, 150, "W₂", "00:00", "#3b82f6"));
                    
                    ctx.appendChild(drawSystemLine(300, "運動系 S′", "#10b981"));
                    ctx.appendChild(drawClock(100, 300, "W′", "00:00", "#10b981"));
                    ctx.appendChild(drawVelocityArrow(100, 300, "速度 v"));
                }
            },
            {
                text: "3. 【イベント1】時計 W′ が、系 S の最初の時計 W₁ の真横をまさに通過します。",
                draw: (ctx) => {
                    ctx.appendChild(drawSystemLine(150, "静止系 S"));
                    ctx.appendChild(drawClock(250, 150, "W₁", "00:00", "#3b82f6", true));
                    ctx.appendChild(drawClock(550, 150, "W₂", "00:00", "#3b82f6"));
                    
                    ctx.appendChild(drawSystemLine(150, "", "#10b981"));
                    ctx.appendChild(drawClock(250, 150, "W′", "00:00", "#10b981", true));
                    ctx.appendChild(drawFlash(250, 150));
                    ctx.appendChild(drawLabel(250, 80, "イベント1: W′ が W₁ を通過", "#f59e0b"));
                }
            },
            {
                text: "4. この瞬間、重なり合った W₁ と W′ の目盛りが同時に記録されます（両方とも 0 とします）。",
                draw: (ctx) => {
                    ctx.appendChild(drawClock(200, 200, "W₁の記録", "t₁ = 0", "#3b82f6"));
                    ctx.appendChild(drawClock(600, 200, "W′の記録", "t′₁ = 0", "#10b981"));
                    ctx.appendChild(drawCenterEqual(400, 200));
                }
            },
            {
                text: "5. 時間が経過し、時計 W′ は系 S の中を距離 d だけ進んでいきます。",
                draw: (ctx) => {
                    ctx.appendChild(drawSystemLine(150, "静止系 S"));
                    ctx.appendChild(drawClock(250, 150, "W₁", "00:10", "#3b82f6"));
                    ctx.appendChild(drawClock(550, 150, "W₂", "00:10", "#3b82f6"));
                    
                    ctx.appendChild(drawSystemLine(150, "", "#10b981"));
                    ctx.appendChild(drawClock(400, 150, "W′", "00:06", "#10b981"));
                    ctx.appendChild(drawVelocityArrow(400, 150, "v"));
                }
            },
            {
                text: "6. 【イベント2】時計 W′ が、系 S の2番目の時計 W₂ の真横を通過しました。",
                draw: (ctx) => {
                    ctx.appendChild(drawSystemLine(150, "静止系 S"));
                    ctx.appendChild(drawClock(250, 150, "W₁", "00:20", "#3b82f6"));
                    ctx.appendChild(drawClock(550, 150, "W₂", "00:20", "#3b82f6", true));
                    
                    ctx.appendChild(drawSystemLine(150, "", "#10b981"));
                    ctx.appendChild(drawClock(550, 150, "W′", "00:12", "#10b981", true));
                    ctx.appendChild(drawFlash(550, 150));
                    ctx.appendChild(drawLabel(550, 80, "イベント2: W′ が W₂ を通過", "#f59e0b"));
                }
            },
            {
                text: "7. ここで再び、出会った W₂ と W′ の目盛り（t₂ と t′₂）が記録されます。",
                draw: (ctx) => {
