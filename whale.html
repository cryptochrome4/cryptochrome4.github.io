<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プライベート画像チェッカー</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: var(--accent-color);
        }
        /* 認証エリア */
        #auth-area {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
        }
        /* メインコンテンツ（初期は非表示） */
        #main-content {
            display: none;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
        }
        .btn-upload {
            border: 2px dashed var(--accent-color);
            color: var(--accent-color);
            background-color: transparent;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        /* プレビューカード */
        .image-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .image-card img {
            width: 100%;
            border-radius: 8px;
            max-height: 300px;
            object-fit: contain;
            background: #111;
        }
        .code-container {
            position: relative;
            margin-top: 10px;
        }
        .code-box {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: #a9ffb2;
            border: 1px solid #444;
        }
        /* コピーボタン（コードの外側に配置） */
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 6px;
            display: block;
            width: auto;
            text-align: center;
        }
        .copy-btn:active {
            background: var(--accent-color);
        }
        .error-msg {
            color: #ff5555;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>俺専用イメージベース</h1>

    <!-- 1. パスワード認証画面 -->
    <div id="auth-area">
        <p>パスワードを入力してください</p>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <button onclick="checkPassword()">ログイン</button>
        <div id="error-location" class="error-msg"></div>
    </div>

    <!-- 2. 画像選択・貼り付け画面 -->
    <div id="main-content">
        <div class="upload-btn-wrapper">
            <div class="btn-upload">📱 スマホから画像を選ぶ</div>
            <input type="file" id="image-loader" accept="image/*" multiple onchange="handleImages(this.files)">
        </div>

        <!-- 選択した画像リストがここに追加される -->
        <div id="preview-list"></div>
    </div>
</div>

<script>
    // ★ここにあなただけのパスワードを設定してください
    const SECRET_KEY = "299792458";

    // 認証チェック
    function checkPassword() {
        const input = document.getElementById('pass-input').value;
        const errorLoc = document.getElementById('error-location');
        
        if (input === SECRET_KEY) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else {
            errorLoc.textContent = "パスワードが違います。";
        }
    }

    // 画像処理
    function handleImages(files) {
        const listContainer = document.getElementById('preview-list');
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64Data = e.target.result;
                createImageCard(base64Data, listContainer);
            }
            reader.readAsDataURL(file);
        }
    }

    // 画像とコード表示のカードを作成
    function createImageCard(base64Data, container) {
        const card = document.createElement('div');
        card.className = 'image-card';

        // プレビュー画像
        const img = document.createElement('img');
        img.src = base64Data;

        // コード表示用のコンテナ
        const codeContainer = document.createElement('div');
        codeContainer.className = 'code-container';

        // 生成コード（例としてHTMLのimgタグ形式にしています）
        const generatedCode = `<img src="${base64Data}" alt="Uploaded Image">`;

        // コードボックス（純粋なテキストのみ）
        const codeBox = document.createElement('div');
        codeBox.className = 'code-box';
        codeBox.textContent = generatedCode;

        // コピー用のボタン（コードボックスの外・下に配置）
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '📋 コードをコピー';
        copyBtn.onclick = function() {
            navigator.clipboard.writeText(generatedCode).then(() => {
                copyBtn.textContent = '✅ コピー完了！';
                setTimeout(() => { copyBtn.textContent = '📋 コードをコピー'; }, 2000);
            }).catch(err => {
                alert('コピーに失敗しました');
            });
        };

        // 組み立て
        codeContainer.appendChild(codeBox);
        codeContainer.appendChild(copyBtn); // コードの外側に配置
        
        card.appendChild(img);
        card.appendChild(codeContainer);
        
        // リストの先頭に追加
        container.insertBefore(card, container.firstChild);
    }
</script>

</body>
</html>
