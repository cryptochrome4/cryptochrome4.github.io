<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相対性理論・時間の遅れ紙芝居</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-wrong: #ef4444;
            --accent-success: #22c55e;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-align: center;
            color: var(--accent);
        }
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-align: center;
        }
        /* コピーアイコンエリアのスタイル */
        .copy-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        .copy-instruction {
            font-size: 0.85rem;
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: bold;
        }
        .icon-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }
        .copy-btn {
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            padding: 10px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
        }
        .copy-btn:hover {
            background: #475569;
            transform: translateY(-2px);
        }
        .copy-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* 正解ボタンのホバー時は青く */
        .copy-btn.real-target:hover svg {
            stroke: var(--accent);
        }
        /* 紙芝居本体のスタイル */
        .kamishibai-container {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .canvas-wrapper {
            position: relative;
            width: 100%;
            padding-top: 60%; /* 5:3 アスペクト比 */
            background: #000;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #111827;
        }
        .nav-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .nav-btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .page-indicator {
            font-size: 1rem;
            font-weight: bold;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>相対性理論「時間の遅れ」視覚化紙芝居</h1>
    <div class="subtitle">2つの事象における時空の不変隔たり（絵が95%の構成）</div>

    <!-- コピーアイコン設置エリア -->
    <div class="copy-container">
        <div class="copy-instruction">👇 11個並んだアイコンのうち【左から7番目】が本物のコードコピーボタンです！</div>
        <div class="icon-row" id="iconRow"></div>
    </div>

    <!-- 紙芝居コンテナ -->
    <div class="kamishibai-container">
        <div class="canvas-wrapper">
            <canvas id="kamishibaiCanvas" width="750" height="450"></canvas>
        </div>
        <div class="controls">
            <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">◀ 前へ</button>
            <div class="page-indicator" id="pageIndicator">1 / 7</div>
            <button class="nav-btn" id="nextBtn" onclick="changePage(1)">次へ ▶</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ----------------------------------------------------
        // 1. コードコピー機能＆偽物・本物アイコンの生成 (左から7番目が本物)
        // ----------------------------------------------------
        const totalIcons = 11;
        const realIndex = 6; // 0始まりで7番目
        const iconRow = document.getElementById('iconRow');
        const toast = document.getElementById('toast');

        // コピー対象となるこのソースコード自体を取得
        const sourceCode = document.documentElement.outerHTML;

        // SVGアイコンのパス
        const svgContent = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

        for (let i = 0; i < totalIcons; i++) {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerHTML = svgContent;
            
            if (i === realIndex) {
                btn.classList.add('real-target');
                btn.title = "本物のコピーボタン";
                btn.onclick = () => {
                    navigator.clipboard.writeText(sourceCode).then(() => {
                        showToast("🎉 正解！コードをクリップボードにコピーしました！", "var(--accent-success)");
                    }).catch(() => {
                        showToast("コピーに失敗しました。ブラウザの権限を確認してください。", "var(--accent-wrong)");
                    });
                };
            } else {
                btn.title = "偽物のアイコン";
                btn.onclick = () => {
                    showToast("❌ 違います！これは偽物のアイコンです。左から7番目を探してください！", "var(--accent-wrong)");
                };
            }
            iconRow.appendChild(btn);
        }

        function showToast(message, bgColor) {
            toast.innerText = message;
            toast.style.backgroundColor = bgColor;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }

        // ----------------------------------------------------
        // 2. 7ページの紙芝居描画エンジン (絵が95%)
        // ----------------------------------------------------
        const canvas = document.getElementById('kamishibaiCanvas');
        const ctx = canvas.getContext('2d');
        let currentPage = 0;
        const totalPages = 7;

        function drawClock(ctx, x, y, radius, timeStr, label, isMoving) {
            ctx.save();
            // 時計の影と外枠
            ctx.shadowColor = isMoving ? 'rgba(56, 189, 248, 0.4)' : 'rgba(255, 255, 255, 0.1)';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = isMoving ? '#38bdf8' : '#e2e8f0';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 時計の目盛り（ドット）
            ctx.fillStyle = '#64748b';
            for (let a = 0; a < 12; a++) {
                let angle = (a * 30) * Math.PI / 180;
                ctx.beginPath();
                ctx.arc(x + Math.cos(angle) * (radius - 12), y + Math.sin(angle) * (radius - 12), 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // 時計の針（文字盤の時間に合わせて簡易表現）
            ctx.strokeStyle = isMoving ? '#38bdf8' : '#f1f5f9';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x, y);
            let timeVal = parseFloat(timeStr);
            let targetAngle = (timeVal * 30 - 90) * Math.PI / 180; 
            ctx.lineTo(x + Math.cos(targetAngle) * (radius - 20), y + Math.sin(targetAngle) * (radius - 20));
            ctx.stroke();

            // デジタル表記の補助
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 30, y + radius + 8, 60, 22);
            ctx.fillStyle = isMoving ? '#38bdf8' : '#ffffff';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(timeStr, x, y + radius + 24);

            // 時計のラベル
            ctx.fillStyle = '#94a3b8';
            ctx.font = '12px sans-serif';
            ctx.fillText(label, x, y - radius - 8);
            ctx.restore();
        }

        function drawSpaceSystem(ctx, y, name, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(50, y);
            ctx.lineTo(700, y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = color;
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(`基準系 ${name}`, 55, y - 10);
        }

        function drawArrow(ctx, fromX, fromY, toX, toY, text) {
            ctx.strokeStyle = '#f59e0b';
            ctx.fillStyle = '#f59e0b';
