    <style>
        /* 極軽量化のため、外部ファイル・外部フォントは一切読み込みません */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* 全体コンテナ */
        #app { width: 100%; max-width: 800px; height: 100vh; max-height: 600px; display: flex; flex-direction: column; position: relative; padding: 20px; }
        
        /* ヘッダー・進捗 */
        header { display: flex; justify-content: space-between; font-size: 14px; color: #aaa; margin-bottom: 10px; }
        #progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
        #progress-fill { height: 100%; width: 2.5%; background: #00adb5; transition: width 0.2s ease; }
        
        /* 紙芝居の舞台（図形をCSSで描画するため、軽くレスポンシブに） */
        #stage { flex: 1; background: #222; border: 2px solid #444; border-radius: 8px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }
        
        /* 絵（イラスト）を描くためのキャンバスエリア（CSSベース） */
        #art-area { width: 100%; height: 65%; position: relative; display: flex; justify-content: center; align-items: center; }
        
        /* ナレーション（字幕）エリア */
        #caption-area { width: 100%; height: 35%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 15px; font-size: 18px; line-height: 1.6; border-top: 1px solid #333; color: #eeeeee; }
        
        /* 操作用ボタン */
        #controls { display: flex; justify-content: space-between; width: 100%; margin-top: 15px; gap: 15px; }
        button { flex: 1; padding: 12px; background: #393e46; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #00adb5; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; border: 1px solid #333; }

        /* --- 絵を描くためのカスタムCSSコンポーネント（ベクター描画） --- */
        .system-frame { width: 80%; height: 80%; border: 2px dashed #666; position: relative; border-radius: 5px; display: flex; align-items: center; justify-content: space-around; }
        .system-label { position: absolute; top: 10px; left: 10px; background: #444; padding: 2px 8px; font-size: 12px; border-radius: 3px; font-weight: bold;}
        .clock { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff; position: relative; display: flex; align-items: center; justify-content: center; background: #333; font-weight: bold; font-size: 14px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .clock::after { content: ''; position: absolute; width: 2px; height: 25px; background: #ff2e63; top: 10px; left: calc(50% - 1px); transform-origin: bottom center; transform: rotate(0deg); }
        .clock.moving { border-color: #00adb5; }
        .clock.moving::after { background: #00adb5; }
        .clock-label { position: absolute; bottom: -22px; font-size: 12px; background: #111; padding: 1px 5px; border-radius: 3px; }
        .arrow { width: 100px; height: 4px; background: #00adb5; position: relative; }
        .arrow::after { content: ''; position: absolute; right: -5px; top: -5px; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 10px solid #00adb5; }
        .space-line { width: 80%; height: 4px; background: #555; position: relative; }
        .distance-marker { position: absolute; bottom: -25px; left: 0; right: 0; text-align: center; font-size: 14px; color: #ff2e63; font-weight: bold; }
        .event-flash { width: 25px; height: 25px; background: #fff; border-radius: 50%; position: absolute; box-shadow: 0 0 20px 10px #fff, 0 0 4px 20px #ff2e63; animation: flash-pulse 1s infinite; }
        .formula { font-size: 24px; font-family: monospace; color: #00adb5; border: 1px solid #444; padding: 10px 20px; background: #1a1a1a; border-radius: 5px; }
        @keyframes flash-pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.8; } }
    </style>
</head>
