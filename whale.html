<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間の遅れ - 10枚の紙芝居</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #151f32;
            --text: #f8fafc;
            --sub: #94a3b8;
            --accent: #38bdf8;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 95vw;
            max-width: 800px;
            background: var(--card);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .title { font-weight: bold; color: var(--accent); }
        .counter { color: var(--sub); font-size: 0.9rem; }
        .stage {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 320px;
        }
        svg { width: 100%; height: 100%; }
        .caption-area {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        .controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            pointer-events: none;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(21,31,50,0.9);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn:disabled {
            border-color: #334155;
            color: #334155;
            cursor: not-allowed;
        }
        
        /* 右下のパスワード・コピー隠しエリア */
        .secret-area {
            position: absolute;
            bottom: 10px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .secret-area:hover { opacity: 1; }
        .secret-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            width: 90px;
            outline: none;
        }
        .secret-btn {
            background: #1e293b;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .secret-btn:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="title">時間の遅れ（Time Dilation）の本質</div>
        <div class="counter" id="pageCounter">1 / 10</div>
    </div>
    
    <div class="stage" id="stageCanvas"></div>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="prevPage()">&lt;</button>
        <button class="btn" id="nextBtn" onclick="nextPage()">&gt;</button>
    </div>

    <div class="caption-area" id="captionText"></div>
    
    <!-- パスワードロック付きコピー機能（右下に小さく配置） -->
    <div class="secret-area">
        <input type="password" id="passInput" class="secret-input" placeholder="🔑 パスワード">
        <button class="secret-btn" onclick="checkAndCopy()">コードをコピー</button>
    </div>
</div>

<script>
const totalPages = 10;
let currentPage = 1;

const storyData = [
    {
        caption: "【1/10】静止した基準となる座標系S（地球側）を定義します。",
        draw: () => `<rect x="50" y="200" width="700" height="80" rx="8" fill="#111827" stroke="#334155" stroke-width="2"/><text x="80" y="245" fill="#38bdf8" font-size="24" font-weight="bold">静止系 S</text>`
    },
    {
        caption: "【2/10】系Sに、完全に同期して同じ時間を刻む2つの時計「W1」と「W2」を置きます。その間の距離は「d」です。",
        draw: () => `
            <rect x="50" y="200" width="700" height="80" rx="8" fill="#111827" stroke="#334155" stroke-width="2"/>
            <circle cx="200" cy="240" r="25" fill="#0b0f19" stroke="#38bdf8" stroke-width="3"/><text x="190" y="245" fill="#38bdf8" font-size="12">W1</text>
            <circle cx="600" cy="240" r="25" fill="#0b0f19" stroke="#38bdf8" stroke-width="3"/><text x="590" y="245" fill="#38bdf8" font-size="12">W2</text>
            <line x1="200" y1="160" x2="600" y2="160" stroke="#f43f5e" stroke-width="2"/>
            <text x="385" y="150" fill="#f43f5e" font-size="18" font-weight="bold">距離 d</text>
        `
    },
    {
        caption: "【3/10】一方、もうひとつの時計「W'」を載せた移動系S'（ロケット）が、速度vで右へ進んでいます。",
        draw: () => `
            <g transform="translate(150, 40)">
                <rect x="0" y="0" width="180" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
                <circle cx="90" cy="35" r="22" fill="#0b0f19" stroke="#fbbf24" stroke-width="3"/><text x="82" y="40" fill="#fbbf24" font-size="12">W'</text>
                <text x="20" y="40" fill="#fbbf24" font-size="16" font-weight="bold">系 S' ➔ v</text>
            </g>
        `
    },
    {
        caption: "【4/10】《イベント1》動く時計W'が、最初の時計W1の真上をぴったり通過します。",
        draw: () => `
            <rect x="50" y="200" width="700" height="80" rx="8" fill="#111827" stroke="#334155" stroke-width="2"/>
            <circle cx="200" cy="240" r="25" fill="#0b0f19" stroke="#38bdf8" stroke-width="3"/>
            <g transform="translate(110, 105)">
                <rect x="0" y="0" width="180" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
                <circle cx="90" cy="35" r="22" fill="#0b0f19" stroke="#fbbf24" stroke-width="3"/>
            </g>
            <text x="210" y="70" fill="#fff" font-size="16" font-weight="bold">★ イベント1 (W1 と W' が重なる)</text>
        `
    },
    {
        caption: "【5/10】この重なった瞬間、お互いの時計の数値を「0」として記録し、スタートします。(W1 = 0, W' = 0)",
        draw: () => `
            <rect x="150" y="40" width="500" height="150" rx="12" fill="#151f32" stroke="#10b981" stroke-width="2"/>
            <text x="200" y="95" fill="#38bdf8" font-size="22" font-weight="bold">W1 の目盛り ＝ 0</text>
            <text x="200" y="145" fill="#fbbf24" font-size="22" font-weight="bold">W' の目盛り ＝ 0</text>
        `
    },
    {
        caption: "【6/10】《イベント2》ロケットは進み続け、今度は二番目の時計W2の真上を通過します。",
        draw: () => `
            <rect x="50" y="200" width="700" height="80" rx="8" fill="#111827" stroke="#334155" stroke-width="2"/>
            <circle cx="600" cy="240" r="25" fill="#0b0f19" stroke="#38bdf8" stroke-width="3"/>
            <g transform="translate(510, 105)">
                <rect x="0" y="0" width="180" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
                <circle cx="90" cy="35" r="22" fill="#0b0f19" stroke="#fbbf24" stroke-width="3"/>
            </g>
            <text x="400" y="70" fill="#fff" font-size="16" font-weight="bold">★ イベント2 (W2 と W' が重なる)</text>
        `
    },
    {
        caption: "【7/10】この時、地球側W2の針は「t」、ロケット側W'の針は「t'」を指していました。この2つの時間の長さを比べます。",
        draw: () => `
            <rect x="150" y="40" width="500" height="150" rx="12" fill="#151f32" stroke="#10b981" stroke-width="2"/>
            <text x="200" y="95" fill="#38bdf8" font-size="22" font-weight="bold">静止系 S の時間間隔 ＝ t</text>
            <text x="200" y="145" fill="#fbbf24" font-size="22" font-weight="bold">移動系 S' の時間間隔 ＝ t'</text>
        `
    },
    {
        caption: "【8/10】静止系Sでは2つのイベントの間に離れた「距離 d」がありますが、ロケット系S'から見ると、2つとも「自分の同じ場所」で起きています(空間距離=0)。",
        draw: () => `
            <text x="100" y="100" fill="#38bdf8" font-size="20" font-weight="bold">地球(系S)：時間＝t ／ 空間の離れ＝d</text>
            <text x="100" y="160" fill="#fbbf24" font-size="20" font-weight="bold">ロケット(系S')：時間＝t' ／ 空間の離れ＝0</text>
        `
    },
    {
        caption: "【9/10】宇宙の絶対ルール「時空の長さ(s²)は不変」より式を結ぶと、 (c·t')² = (c·t)² - d² となり、t' の方は必ず引き算されます。",
        draw: () => `
            <rect x="80" y="70" width="640" height="120" rx="10" fill="#0b0f19" stroke="#a855f7" stroke-width="2"/>
            <text x="130" y="140" fill="#fff" font-size="32" font-weight="bold">(c · t')²   ＝   (c · t)²   －   d²</text>
        `
    },
    {
        caption: "【10/10】結論：引き算された分、必ず t' ＜ t になります。つまり、動いている時計W'の刻む時間の方が短く、「動く時計は遅く進む」のです！",
        draw: () => `
            <rect x="100" y="60" width="600" height="140" rx="12" fill="#1e293b" stroke="#e11d48" stroke-width="3"/>
            <text x="240" y="125" fill="#fbbf24" font-size="48" font-weight="bold">t'  ＜  t</text>
            <text x="150" y="230" fill="#94a3b8" font-size="18" font-weight="bold">空間の隔たり(d)が、移動する時間を遅らせる原因です。</text>
        `
    }
];

function updatePage() {
    const stage = document.getElementById("stageCanvas");
    const counter = document.getElementById("pageCounter");
    const caption = document.getElementById("captionText");
    const prevBtn = document.getElementById("prevBtn");
