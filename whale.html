<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相対性理論・時間の遅れ紙芝居 (39ページ)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90vw;
            max-width: 800px;
            height: 85vh;
            max-height: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* コピーボタン（外部用ではなく、この画面自体のUI用） */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title {
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        .counter {
            font-size: 0.9rem;
            color: var(--text-sub);
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* 紙芝居メイン領域（95%が絵） */
        .stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* SVGグラフィックのスタイル */
        svg {
            width: 100%;
            height: 100%;
            max-height: 380px;
            transition: all 0.5s ease;
        }

        /* 活字説明文（下部に控えめに配置） */
        .caption-area {
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .caption {
            font-size: 1.05rem;
            line-height: 1.5;
            color: var(--text-main);
            margin: 0;
            font-weight: 500;
        }

        /* コントロールボタン */
        .controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
            pointer-events: none;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.1);
        }

        .btn:disabled {
            border-color: #475569;
            color: #475569;
            background: rgba(30, 41, 59, 0.4);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 複製用クイックUIボタン */
        .copy-embed-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .copy-embed-btn:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="title">相対性理論：動く時計の遅れモデル</div>
        <button class="copy-embed-btn" onclick="copyCodeSnippet()">📋 コードをコピー</button>
        <div class="counter" id="pageCounter">1 / 39</div>
    </div>
    
    <div class="stage" id="stageCanvas">
        <!-- SVG絵コンテがJavaScriptから動的に注入されます -->
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="prevPage()" disabled>&lt;</button>
        <button class="btn" id="nextBtn" onclick="nextPage()">&gt;</button>
    </div>

    <div class="caption-area">
        <p class="caption" id="captionText">Loading...</p>
    </div>
</div>
