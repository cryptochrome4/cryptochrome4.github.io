<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacetime TCG Gallery</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #c5a059;
            --text-light: #ffffff;
            --monster-color: #b37d4e;
            --spell-color: #1d7a6e;
            --trap-color: #bc3a62;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-color);
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
            text-align: center;
        }

        .subtitle {
            color: #85929e;
            margin-bottom: 40px;
            text-align: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
        }

        /* 遊戯王風カードスタイル */
        .card {
            background: linear-gradient(135deg, #2c3e50, #000000);
            border: 4px solid #4a3b2c;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7), inset 0 0 15px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 1.45;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.4);
        }

        /* カードヘッダー */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 4px;
            margin-bottom: 6px;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .card-attribute {
            background-color: #5d4037;
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid #fff;
        }

        /* レベル（星） */
        .card-stars {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
            height: 14px;
        }

        .star {
            color: #ffc107;
            font-size: 0.9rem;
            margin-left: 1px;
            text-shadow: 0 0 3px #000;
        }

        /* アートワーク部分（CSSグラデーション） */
        .card-image {
            width: 100%;
            height: 180px;
            border: 3px solid #1a1a1a;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }

        .card-image::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(0,0,0,0.4), transparent);
            mix-blend-mode: overlay;
        }

        /* 効果テキストボックス */
        .card-body {
            background-color: #f2e6d9;
            border: 2px solid #664d36;
            padding: 8px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
            font-size: 0.75rem;
            line-height: 1.3;
            overflow: hidden;
            border-radius: 4px;
        }

        .card-type {
            font-weight: bold;
            border-bottom: 1px solid #664d36;
            padding-bottom: 2px;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }

        .card-text {
            flex-grow: 1;
            overflow-y: auto;
            font-style: italic;
        }

        /* 攻守ステータス */
        .card-stats {
            align-self: flex-end;
            font-weight: bold;
            border-top: 1px solid #664d36;
            width: 100%;
            text-align: right;
            padding-top: 2px;
            margin-top: 4px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* 魔法・罠カード用調整 */
        .card.spell { background: linear-gradient(135deg, #0a3d36, #000000); }
        .card.trap { background: linear-gradient(135deg, #5c0f26, #000000); }
        .card.spell .card-body { background-color: #e6f2f0; border-color: #1d7a6e;}
        .card.trap .card-body { background-color: #f9e6ec; border-color: #bc3a62;}
        .card.spell .card-type, .card.spell .card-text { color: #0a3d36; }
        .card.trap .card-type, .card.trap .card-text { color: #5c0f26; }
        .card.spell .card-attribute { background-color: var(--spell-color); }
        .card.trap .card-attribute { background-color: var(--trap-color); }
    </style>
</head>
