<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Dilation Kamishibai - 時空の不変性と時間の遅れ</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ヘッダー・ツールバー */
        .toolbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(22, 27, 34, 0.8);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .copy-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pw-input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        .pw-input:focus {
            border-color: var(--accent-color);
        }

        .copy-btn {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .copy-btn.success {
            background-color: #238636;
            border-color: #2ea043;
            color: #fff;
        }

        /* 紙芝居ステージ */
        .stage-container {
            margin-top: 80px;
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* グラフィック（95%を占めるエリア） */
        .graphic-area {
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 80%;
        }

        /* ナレーション（最小限の文字説明） */
        .narration {
            background-color: rgba(13, 17, 23, 0.85);
            border-top: 1px solid var(--border-color);
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
        }

        /* コントロール */
        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .nav-btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .nav-btn:hover {
            opacity: 0.9;
        }

        .nav-btn:disabled {
            background-color: #21262d;
            color: #8b949e;
            cursor: not-allowed;
            border: 1px solid var(--border-color);
        }

        .page-indicator {
            font-size: 1rem;
            font-weight: bold;
        }

        /* アニメーション用クラス */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .pulse { animation: pulse 3s infinite ease-in-out; }
    </style>
</head>
<body>

    <!-- ツールバー（上部固定） -->
    <div class="toolbar">
        <div class="title">時空の不変性と「時間の遅れ」</div>
        <div class="copy-container">
            <input type="password" id="passwordInput" class="pw-input" placeholder="パスワードを入力">
            <button id="copyCodeBtn" class="copy-btn">
                <!-- クリップボードアイコン (SVG) -->
                <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" style="max-height:16px;">
                    <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path>
                    <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
                </svg>
                <span>コードをコピー</span>
            </button>
        </div>
    </div>

    <!-- 紙芝居ステージ -->
    <div class="stage-container">
        
        <!-- 1ページ: 表紙 -->
        <div class="slide active" id="slide-1">
            <div class="graphic-area">
                <svg viewBox="0 0 800 600">
                    <circle cx="400" cy="300" r="120" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="10 5" class="pulse"/>
                    <text x="400" y="310" font-size="72" fill="#58a6ff" font-weight="bold" text-anchor="middle">c</text>
                    <text x="400" y="450" font-size="24" fill="#8b949e" text-anchor="middle">光速度不変が織りなす時空のパズル</text>
                </svg>
            </div>
            <div class="narration">第1幕：二つの異なる視点（系）が交わるとき、時間は等しく流れるのだろうか？</div>
        </div>

        <!-- 2ページ: 静止系 S -->
        <div class="slide" id="slide-2">
            <div class="graphic-area">
                <svg viewBox="0 0 800 600">
                    <line x1="150" y1="350" x2="650" y2="350" stroke="#30363d" stroke-width="4" />
                    <!-- W1 -->
                    <circle cx="200" cy="300" r="40" fill="#1f242c" stroke="#ff7b72" stroke-width="4"/>
                    <line x1="200" y1="300" x2="200" y2="270" stroke="#ff7b72" stroke-width="4" stroke-linecap="round"/>
                    <text x="200" y="370" font-size="20" fill="#ff7b72" text-anchor="middle">時計 W₁</text>
                    <!-- W2 -->
                    <circle cx="600" cy="300" r="40" fill="#1f242c" stroke="#ff7b72" stroke-width="4"/>
                    <line x1="600" y1="300" x2="600" y2="270" stroke="#ff7b72" stroke-width="4" stroke-linecap="round"/>
                    <text x="600" y="370" font-size="20" fill="#ff7b72" text-anchor="middle">時計 W₂</text>
                    <!-- 距離 d -->
                    <line x1="200" y1="420" x2="600" y2="420" stroke="#58a6ff" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
                    <text x="400" y="450" font-size="22" fill="#58a6ff" text-anchor="middle">空間的距離 d (系 S)</text>
                </svg>
            </div>
            <div class="narration">静止している系 $S$ には、距離 $d$ 離れた同期する二つの時計 $W_1$ と $W_2$ がある。</div>
        </div>

        <!-- 3ページ: 動く系 S' -->
        <div class="slide" id="slide-3">
            <div class="graphic-area">
                <svg viewBox="0 0 800 600">
                    <line x1="150" y1="350" x2="650" y2="350" stroke="#30363d" stroke-width="2" />
                    <circle cx="200" cy="350" r="6" fill="#ff7b72"/>
                    <circle cx="600" cy="350" r="6" fill="#ff7b72"/>
                    <!-- W' の接近 -->
                    <g transform="translate(100, 180)">
                        <circle cx="0" cy="0" r="40" fill="#1f242c" stroke="#79c0ff" stroke-width="4"/>
                        <line x1="0" y1="0" x2="0" y2="30" stroke="#79c0ff" stroke-width="4" stroke-linecap="round" transform="rotate(-30)"/>
                        <text x="0" y="-50" font-size="20" fill="#79c0ff" text-anchor="middle">移動する時計 W' (系 S')</text>
                        <!-- 速度ベクトル -->
                        <line x1="50" y1="0" x2="120" y2="0" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>
                        <text x="85" y="-10" font-size="16" fill="#58a6ff" text-anchor="middle">速度 v</text>
                    </g>
                </svg>
            </div>
            <div class="narration">そこへ、別の系 $S'$ に属する時計 $W'$ が速度 $v$ でまっすぐ近づいてくる。</div>
        </div>

        <!-- 4ページ: イベント1 (W' と W1 が重なる) -->
