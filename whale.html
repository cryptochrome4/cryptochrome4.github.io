<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俺専用イメージベース</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 24px;
        }
        /* 認証エリア */
        #auth-area {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .login-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
        }
        /* メインコンテンツ（初期は非表示） */
        #main-content {
            display: none;
            width: 100%;
        }
        /* 画像ギャラリーカード（余計な装飾を消し、写真単体を目立たせる） */
        .image-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
            cursor: pointer; /* タップできることを示す */
            transition: opacity 0.2s;
        }
        .image-card:active {
            opacity: 0.6; /* スマホでタップした瞬間に一瞬薄くなる（フィードバック用） */
        }
        .image-card img {
            width: 100%;
            border-radius: 8px;
            max-height: 400px;
            object-fit: contain;
            background: #111;
            display: block;
        }
        .error-msg {
            color: #ff5555;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        /* トースト通知（コピー成功時に画面下部に一瞬だけ出る黒い帯） */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 173, 181, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>俺専用イメージギャラリー</h1>

    <!-- 1. パスワード認証画面 -->
    <div id="auth-area">
        <p>パスワードを入力してください</p>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <button class="login-btn" onclick="checkPassword()">ログイン</button>
        <div id="error-location" class="error-msg"></div>
    </div>

    <!-- 2. 保存済み画像リスト画面（写真のみ並ぶ） -->
    <div id="main-content">
        <div id="gallery-list"></div>
    </div>
</div>

<!-- コピー完了通知用（一瞬で消えます） -->
<div id="toast">コードをコピーしました！</div>

<script>
    // ★ここにあなただけの数字パスワードを設定してください（例: "1234"）
    const SECRET_KEY = "1234";

    // ★ここにIssueで生成した18枚の画像URLを入れてください
    const imagesData = [
        "★1枚目の画像URLをここに貼り付け",
        "★2枚目の画像URLをここに貼り付け",
        "★3枚目の画像URLをここに貼り付け",
        "★4枚目の画像URLをここに貼り付け",
        "★5枚目の画像URLをここに貼り付け",
        "★6枚目の画像URLをここに貼り付け",
        "★7枚目の画像URLをここに貼り付け",
        "★8枚目の画像URLをここに貼り付け",
        "★9枚目の画像URLをここに貼り付け",
        "★10枚目の画像URLをここに貼り付け",
        "★11枚目の画像URLをここに貼り付け",
        "★12枚目の画像URLをここに貼り付け",
        "★13枚目の画像URLをここに貼り付け",
        "★14枚目の画像URLをここに貼り付け",
        "★15枚目の画像URLをここに貼り付け",
        "★16枚目の画像URLをここに貼り付け",
        "★17枚目の画像URLをここに貼り付け",
        "★18枚目の画像URLをここに貼り付け"
    ];

    // 認証チェック
    function checkPassword() {
        const input = document.getElementById('pass-input').value;
        const errorLoc = document.getElementById('error-location');
        
        if (input === SECRET_KEY) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderGallery();
        } else {
            errorLoc.textContent = "パスワードが違います。";
        }
    }

    // 埋め込まれた画像からギャラリーを生成
    function renderGallery() {
        const listContainer = document.getElementById('gallery-list');
        
        imagesData.forEach((srcData, index) => {
            if(srcData.startsWith("★")) return;

            const card = document.createElement('div');
            card.className = 'image-card';

            const img = document.createElement('img');
            img.src = srcData;
            card.appendChild(img);

            // コピーされる隠しHTMLコード
            const generatedCode = `<img src="${srcData}" alt="Image ${index + 1}">`;

            // 写真（カード全体）をタップした時の処理
            card.onclick = function() {
                navigator.clipboard.writeText(generatedCode).then(() => {
                    showToast();
                }).catch(err => {
                    alert('コピーに失敗しました');
                });
            };
            
            listContainer.appendChild(card);
        });
    }

    // コピー完了通知を表示する関数
    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 1500); // 1.5秒後に自動で消える
    }
</script>

</body>
</html>
