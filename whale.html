html<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相対性理論・時間の遅れ紙芝居</title>
    <style>
        /* 全体設定：軽量化のため外部フォントや画像は一切不使用 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* 紙芝居の舞台（コンテナ） */
        #stage { width: 100vw; height: 75vh; max-width: 800px; max-height: 600px; position: relative; background: #1a1a1a; border: 4px solid #333; border-radius: 8px; overflow: hidden; }
        
        /* 各ページ共通：絵を95%にするためのレイアウト */
        .page { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; display: flex; flex-direction: column; transition: opacity 0.4s ease; pointer-events: none; z-index: 1; }
        .page.active { opacity: 1; pointer-events: auto; z-index: 2; }
        
        /* 95%を占めるビジュアル（絵）のエリア */
        .canvas-area { width: 100%; height: 93%; position: relative; background: #222; overflow: hidden; }
        
        /* 5%未満の文字エリア（極限までシンプルに） */
        .text-area { width: 100%; height: 7%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: clamp(12px, 2vw, 16px); color: #ccc; border-top: 1px solid #444; text-align: center; padding: 0 10px; }
        
        /* 操作用コントローラー */
        #controls { width: 100%; max-width: 800px; height: 8vh; display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #222; border-radius: 0 0 8px 8px; }
        button { background: #444; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
        button:hover { background: #666; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }
        #page-num { font-size: 16px; font-weight: bold; }

        /* グラフィック用の共通パーツ（CSSで描画することで超軽量化） */
        .space-line { position: absolute; bottom: 30%; left: 5%; width: 90%; height: 2px; background: #555; }
        .space-label { position: absolute; bottom: 25%; font-size: 14px; color: #888; font-weight: bold; }
        .clock { position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .clock::after { content: ''; position: absolute; width: 2px; height: 20px; background: #ff4757; top: 10px; transform-origin: bottom center; }
        
        /* 静止系Sの時計（青） */
        .clock.s-clock { background: #1e3799; border-color: #4a69bd; color: #fff; }
        /* 移動系S'の時計（黄） */
        .clock.s-prime-clock { background: #f6b93b; border-color: #fad390; color: #000; }
        .clock.s-prime-clock::after { background: #000; }

        /* 特殊な針の回転アニメーションの定義 */
        .t0::after { transform: rotate(0deg); }
        .t4::after { transform: rotate(120deg); }
        .t8::after { transform: rotate(240deg); }
        .t3::after { transform: rotate(90deg); }

        /* イベントを示す光の輪 */
        .flash { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 3px dashed #ff4757; animation: pulse 1.5s infinite; transform: translate(-10px, -10px); }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
