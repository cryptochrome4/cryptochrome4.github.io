<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俺専用イメージベース</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 24px;
        }
        /* 認証エリア */
        #auth-area {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .login-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
        }
        /* メインコンテンツ（初期は非表示） */
        #main-content {
            display: none;
            width: 100%;
        }
        /* 画像ギャラリーカード */
        .image-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        .image-card img {
            width: 100%;
            border-radius: 8px;
            max-height: 300px;
            object-fit: contain;
            background: #111;
        }
        .code-container {
            position: relative;
            margin-top: 12px;
        }
        .code-box {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            color: #a9ffb2;
            border: 1px solid #444;
        }
        /* コピーボタン（コードボックスの外・下に配置） */
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
            display: block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            font-weight: bold;
        }
        .copy-btn:active {
            background: var(--accent-color);
        }
        .error-msg {
            color: #ff5555;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>俺専用イメージギャラリー</h1>

    <!-- 1. パスワード認証画面 -->
    <div id="auth-area">
        <p>パスワードを入力してください</p>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <button class="login-btn" onclick="checkPassword()">ログイン</button>
        <div id="error-location" class="error-msg"></div>
    </div>

    <!-- 2. 保存済み画像リスト画面 -->
    <div id="main-content">
        <div id="gallery-list"></div>
    </div>
</div>

<script>
    // ★ここにあなただけの数字パスワードを設定してください（例: "1234"）
    const SECRET_KEY = "1234";

    // ★ここにIssueで生成した18枚の画像URLを入れてください
    const imagesData = [
        "https://private-user-images.githubusercontent.com/307046148/625820246-c6beaa10-cf71-46b2-97bd-10c44a081b40.jpg?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmF3LmdpdGh1YnVzZXJjb250ZW50LmNvbSIsImtleSI6ImtleTUiLCJleHAiOjE3ODQ4MjMzNjgsIm5iZiI6MTc4NDgyMzA2OCwicGF0aCI6Ii8zMDcwNDYxNDgvNjI1ODIwMjQ2LWM2YmVhYTEwLWNmNzEtNDZiMi05N2JkLTEwYzQ0YTA4MWI0MC5qcGc_WC1BbXotQWxnb3JpdGhtPUFXUzQtSE1BQy1TSEEyNTYmWC1BbXotQ3JlZGVudGlhbD1BS0lBVkNPRFlMU0E1M1BRSzRaQSUyRjIwMjYwNzIzJTJGdXMtZWFzdC0xJTJGczMlMkZhd3M0X3JlcXVlc3QmWC1BbXotRGF0ZT0yMDI2MDcyM1QxNjExMDhaJlgtQW16LUV4cGlyZXM9MzAwJlgtQW16LVNpZ25hdHVyZT0zNDE2YTg1MWViMmVmNzQ3MjdhYjUzZDc0NTc5ODZkOGIzZDk5NzgwMDQzYzlmYzFkZTBhMGU2M2QxOGNlM2M5JlgtQW16LVNpZ25lZEhlYWRlcnM9aG9zdCZyZXNwb25zZS1jb250ZW50LXR5cGU9aW1hZ2UlMkZqcGVnIn0.IIXeKDGgMPdQw70MMCz0FjZqGobhistlVic9HzsVfVo",
        "★2枚目の画像URLをここに貼り付け",
        "★3枚目の画像URLをここに貼り付け",
        "★4枚目の画像URLをここに貼り付け",
        "★5枚目の画像URLをここに貼り付け",
        "★6枚目の画像URLをここに貼り付け",
        "★7枚目の画像URLをここに貼り付け",
        "★8枚目の画像URLをここに貼り付け",
        "★9枚目の画像URLをここに貼り付け",
        "★10枚目の画像URLをここに貼り付け",
        "★11枚目の画像URLをここに貼り付け",
        "★12枚目の画像URLをここに貼り付け",
        "★13枚目の画像URLをここに貼り付け",
        "★14枚目の画像URLをここに貼り付け",
        "★15枚目の画像URLをここに貼り付け",
        "★16枚目の画像URLをここに貼り付け",
        "★17枚目の画像URLをここに貼り付け",
        "★18枚目の画像URLをここに貼り付け"
    ];

    // 認証チェック
    function checkPassword() {
        const input = document.getElementById('pass-input').value;
        const errorLoc = document.getElementById('error-location');
        
        if (input === SECRET_KEY) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderGallery();
        } else {
            errorLoc.textContent = "パスワードが違います。";
        }
    }

    // 埋め込まれた画像からギャラリーを生成
    function renderGallery() {
        const listContainer = document.getElementById('gallery-list');
        
        imagesData.forEach((srcData, index) => {
            // ダミーのテキストのままの場合はスキップ
            if(srcData.startsWith("★")) return;

            const card = document.createElement('div');
            card.className = 'image-card';

            const img = document.createElement('img');
            img.src = srcData;

            const codeContainer = document.createElement('div');
            codeContainer.className = 'code-container';

            // コピーされるHTMLコードの形式
            const generatedCode = `<img src="${srcData}" alt="Image ${index + 1}">`;

            const codeBox = document.createElement('div');
            codeBox.className = 'code-box';
            codeBox.textContent = generatedCode;

            // コピーボタン（コードの外側に配置）
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = `📋 ${index + 1}枚目のコードをコピー`;
            copyBtn.onclick = function() {
                navigator.clipboard.writeText(generatedCode).then(() => {
                    copyBtn.textContent = '✅ コピー完了！';
                    setTimeout(() => { copyBtn.textContent = `📋 ${index + 1}枚目のコードをコピー`; }, 2000);
                }).catch(err => {
                    alert('コピーに失敗しました');
                });
            };

            codeContainer.appendChild(codeBox);
            codeContainer.appendChild(copyBtn);
            
            card.appendChild(img);
            card.appendChild(codeContainer);
            
            listContainer.appendChild(card);
        });
    }
</script>

</body>
</html>
