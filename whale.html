// 描画ロジックの共通パーツ
function getSvgBase() { return `<svg width="100%" height="100%" style="background:#111;">`; }
function getLine() { return `<line x1="50" y1="250" x2="750" y2="250" stroke="#444" stroke-width="4" stroke-dasharray="5,5"/><text x="30" y="290" fill="#8b949e" font-size="14">静止系 S の宇宙空間</text>`; }
function getDist() { return `<line x1="200" y1="320" x2="600" y2="320" stroke="#58a6ff" stroke-width="2"/><line x1="200" y1="310" x2="200" y2="330" stroke="#58a6ff" stroke-width="2"/><line x1="600" y1="310" x2="600" y2="330" stroke="#58a6ff" stroke-width="2"/><text x="400" y="345" fill="#58a6ff" font-size="16" text-anchor="middle">空間距離 d</text>`; }
function getClock(x, y, name, time, color, isMoving=false, highlight=false) {
    let arrow = isMoving ? `<text x="${x}" y="${y-45}" fill="${color}" font-size="18" text-anchor="middle">➔ (速度v)</text>` : '';
    let hl = highlight ? `<circle cx="${x}" cy="${y}" r="42" fill="none" stroke="#ffd700" stroke-width="4"/>` : '';
    return `${arrow}${hl}<circle cx="${x}" cy="${y}" r="35" fill="#222" stroke="${color}" stroke-width="3"/><circle cx="${x}" cy="${y}" r="2" fill="#fff"/><text x="${x}" y="${y+5}" fill="#fff" font-size="14" text-anchor="middle" font-weight="bold">${time}</text><text x="${x}" y="${y+55}" fill="${color}" font-size="16" text-anchor="middle" font-weight="bold">${name}</text>`;
}
function getFlash(x, y) { return `<circle cx="${x}" cy="${y}" r="60" fill="url(#fGrad)" opacity="0.7"/><defs><radialGradient id="fGrad"><stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#ffd700" stop-opacity="0"/></radialGradient></defs>`; }
